services:
  app:
    build:
      context: .
      args:
        PYTHON_VERSION: "3.8"
    image: protwis-django:dev
    container_name: protwis-app
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=protwis.settings_local_docker
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=protwis
      - POSTGRES_PASSWORD=protwis
      - POSTGRES_DB=protwis
      - PROTWIS_DATA_DIR=/app/data/protwis/gpcr
    # Source and data are bind-mounted — the image stays code-free so
    # upgrading Python/Django is a pure image rebuild.
    # Override defaults via .env (see .env.example).
    volumes:
      - ${PROTWIS_SRC:-../protwis}:/app/src
      - ${PROTWIS_GPCRDB_DATA:-../gpcrdb_data}:/app/data/protwis/gpcr
    ports:
      - "8000:8000"
    networks:
      - gpcrdb
    depends_on:
      db:
        condition: service_healthy

  db:
    # TODO: switch to ghcr.io/protwis/postgres16-rdkit:latest once that package
    # is made public on GitHub. Using iskoldt's public Docker Hub image meanwhile.
    image: iskoldt/postgres16-rdkit:latest
    container_name: protwis-db
    restart: unless-stopped
    shm_size: 2g
    environment:
      - POSTGRES_USER=protwis
      - POSTGRES_PASSWORD=protwis
      - POSTGRES_DB=protwis
      - PGDATA=/var/lib/postgresql/data
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gpcrdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U protwis"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: protwis-adminer
    restart: unless-stopped
    ports:
      - "8888:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=db
    networks:
      - gpcrdb
    depends_on:
      db:
        condition: service_healthy

networks:
  gpcrdb:

volumes:
  postgres_data:
