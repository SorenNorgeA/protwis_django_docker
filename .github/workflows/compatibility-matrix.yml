name: Compatibility Matrix

# Manually-triggered probe of dependency-version combinations.
# See docs/design-pipeline-3.md for the full design.
#
# What this workflow does:
#   1. Two parallel jobs (amd64 on ubuntu-latest, arm64 on the self-hosted
#      runner) each expand scripts/matrix_versions.py into the full
#      Cartesian product and run every cell natively for their arch via
#      scripts/run_matrix_cell.sh. Per-cell tags are arch-suffixed
#      (matrix-py311-dj42-rdk202409-amd64).
#   2. A merge job downloads both arch artifacts, joins them via
#      scripts/merge_matrix_cells.py, creates a multi-arch manifest list
#      under the un-suffixed BASE_TAG for cells where BOTH arches passed,
#      and renders docs/compatibility-matrix.md.
#
# Half-pass cells (one arch failed) intentionally publish only the
# per-arch tag — no manifest list — so consumers don't get a
# `not found for your platform` error from docker pull.
#
# To add a new Python/Django/RDKit version: edit scripts/matrix_versions.py.
# Nothing in this workflow file needs to change.
#
# A red cell never fails the workflow — failures are data, not faults.

on:
  workflow_dispatch:

permissions:
  contents: write          # to commit the MD (merge job)
  packages: write          # to push to ghcr

jobs:
  matrix-amd64:
    name: Matrix cells (amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 330   # safety margin under the 6 h hard limit
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          # Pin uv version for reproducibility; bump in a separate PR.
          version: "0.4.30"

      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run all matrix cells (amd64, sequential)
        env:
          GH_OWNER: ${{ github.repository_owner }}
        run: |
          mkdir -p cell-results
          python3 scripts/expand_matrix.py | \
          while IFS=, read -r py_min py_max dj dj_next rdk rdk_next; do
            scripts/run_matrix_cell.sh \
              "$py_min" "$py_max" \
              "$dj" "$dj_next" \
              "$rdk" "$rdk_next" \
              amd64 \
              cell-results/
          done

      - name: Upload amd64 cell results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cell-results-amd64
          path: cell-results/
          retention-days: 30

  matrix-arm64:
    name: Matrix cells (arm64)
    runs-on: self-hosted
    timeout-minutes: 330
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.30"

      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run all matrix cells (arm64, sequential)
        env:
          GH_OWNER: ${{ github.repository_owner }}
        run: |
          mkdir -p cell-results
          python3 scripts/expand_matrix.py | \
          while IFS=, read -r py_min py_max dj dj_next rdk rdk_next; do
            scripts/run_matrix_cell.sh \
              "$py_min" "$py_max" \
              "$dj" "$dj_next" \
              "$rdk" "$rdk_next" \
              arm64 \
              cell-results/
          done

      - name: Upload arm64 cell results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cell-results-arm64
          path: cell-results/
          retention-days: 30

  merge:
    name: Merge & render
    needs: [matrix-amd64, matrix-arm64]
    if: always() && (needs.matrix-amd64.result != 'cancelled' || needs.matrix-arm64.result != 'cancelled')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download amd64 cell results
        uses: actions/download-artifact@v4
        with:
          name: cell-results-amd64
          path: cell-results-amd64/

      - name: Download arm64 cell results
        uses: actions/download-artifact@v4
        with:
          name: cell-results-arm64
          path: cell-results-arm64/

      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge per-arch results & create manifest lists
        run: |
          python3 scripts/merge_matrix_cells.py \
            cell-results-amd64/ \
            cell-results-arm64/ \
            cell-results/

      - name: Render compatibility-matrix.md
        env:
          GH_OWNER: ${{ github.repository_owner }}
          RUN_URL:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          mkdir -p docs
          python3 scripts/render_matrix_md.py cell-results/ > docs/compatibility-matrix.md

      - name: Commit compatibility-matrix.md if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/compatibility-matrix.md
          if git diff --staged --quiet; then
            echo "No matrix changes."
          else
            git commit -m "Update compatibility matrix [skip ci]"
            git push
          fi

      - name: Upload merged cell results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: matrix-cell-results
          path: cell-results/
          retention-days: 30
